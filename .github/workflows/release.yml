name: Flutter Auto Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 🔥 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 🔥 Create key.properties
      - name: Create key.properties
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # 🔥 Auto version update (Build Number = Timestamp)
      - name: Update version
        run: |
          BUILD_NUMBER=$(date +%s)
          sed -i "s/+[0-9]*/+$BUILD_NUMBER/" pubspec.yaml

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.example.flutter_app_publish_2026
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal # Safer for first-time automated setup
